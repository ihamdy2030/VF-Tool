<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Audit Engine</title>

<style>
body {font-family:'Segoe UI'; margin:0; background:#f4f6f8;}

.header {
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:15px 25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo {height:50px;}

.title {
font-size:20px;
font-weight:bold;
color:#003366;
flex:1;
text-align:center;
}

.container {padding:20px;}

#search {
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.suggestions {
background:white;
border:1px solid #ccc;
border-top:none;
max-height:150px;
overflow:auto;
}

.suggestion {
padding:10px;
cursor:pointer;
}

.suggestion:hover {background:#f1f1f1;}

.result {
background:white;
margin-top:12px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
border-left:5px solid #003366;
}

.highlight {background:yellow;}

button {
margin-top:10px;
padding:8px 12px;
background:#e60000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

iframe {
width:100%;
height:500px;
margin-top:15px;
}
</style>
</head>

<body>

<div class="header">
<img src="tuv.png" class="logo">
<div class="title">Smart Audit Engine</div>
<img src="vodafone.png" class="logo">
</div>

<div class="container">

<input type="text" id="search" placeholder="🔍 Search anything (PPE, EN, Activity...)">
<div id="suggestions" class="suggestions"></div>

<div id="results"></div>

<iframe id="pdfViewer"></iframe>

</div>

<script>

const data = [
{
activity:"Confined Space",
text:"Confined spaces require gas testing and permit.",
keywords:"confined space gas oxygen entry permit",
hazard:"Toxic gas",
ppe:"Respirator, Harness",
en:"EN 140, EN 143, EN 361",
page:14,
file:"HSW22.pdf"
},
{
activity:"Working at Height",
text:"Full fall protection required.",
keywords:"height fall harness lanyard",
hazard:"Fall",
ppe:"Harness, Helmet",
en:"EN 361, EN 397",
page:8,
file:"HSW22.pdf"
},
{
activity:"Hot Work",
text:"Welding requires fire protection.",
keywords:"welding cutting hot work fire",
hazard:"Fire",
ppe:"Helmet, Gloves",
en:"EN 175, EN 379",
page:20,
file:"HSW22.pdf"
}
];

const searchInput = document.getElementById("search");
const resultsDiv = document.getElementById("results");
const suggestionsDiv = document.getElementById("suggestions");

function highlight(text, keyword){
return text.replace(new RegExp(keyword, "gi"),
m => `<span class="highlight">${m}</span>`);
}

// Suggestions
searchInput.addEventListener("input", function(){
let keyword = this.value.toLowerCase();
suggestionsDiv.innerHTML = "";

if(keyword.length < 2) return;

let suggestions = data.filter(item =>
item.activity.toLowerCase().includes(keyword) ||
item.keywords.includes(keyword)
);

suggestions.forEach(item=>{
suggestionsDiv.innerHTML += `
<div class="suggestion" onclick="selectSuggestion('${item.activity}')">
${item.activity}
</div>`;
});
});

function selectSuggestion(text){
searchInput.value = text;
suggestionsDiv.innerHTML = "";
performSearch(text.toLowerCase());
}

// Search
searchInput.addEventListener("keyup", function(e){
performSearch(this.value.toLowerCase());
});

function performSearch(keyword){

resultsDiv.innerHTML = "";
if(keyword === "") return;

let results = data.map(item => {

let score = 0;

if(item.activity.toLowerCase().includes(keyword)) score += 5;
if(item.text.toLowerCase().includes(keyword)) score += 3;
if(item.ppe.toLowerCase().includes(keyword)) score += 2;
if(item.en.toLowerCase().includes(keyword)) score += 2;
if(item.keywords.toLowerCase().includes(keyword)) score += 4;

return {...item, score};
})
.filter(item => item.score > 0)
.sort((a,b)=> b.score - a.score);

results.forEach(item=>{
resultsDiv.innerHTML += `
<div class="result">

<b>${highlight(item.activity, keyword)}</b>

<div>${highlight(item.text, keyword)}</div>

<div><b>Hazard:</b> ${item.hazard}</div>
<div><b>PPE:</b> ${item.ppe}</div>
<div><b>EN:</b> ${item.en}</div>

<button onclick="openPDF('${item.file}', ${item.page}')">
📄 Open Page ${item.page}
</button>

</div>`;
});

}

function openPDF(file,page){
document.getElementById("pdfViewer").src = file + "#page=" + page;
}

</script>

</body>
</html>
