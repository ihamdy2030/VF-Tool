<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Audit Engine</title>

<style>
body {font-family:'Segoe UI'; margin:0; background:#f4f6f8;}

.header {
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:15px 25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo {height:50px;}

.title {
font-size:20px;
font-weight:bold;
color:#003366;
text-align:center;
flex:1;
}

.vodafone-line {height:5px; background:#e60000;}

.container {padding:20px;}

#search, #ppeFilter {
width:100%;
padding:12px;
margin-bottom:10px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
}

.result {
background:white;
margin-top:12px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
border-left:5px solid #003366;
}

.section {font-weight:bold; color:#003366;}
.highlight {background:yellow;}

button {
margin-top:10px;
padding:8px 12px;
background:#e60000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

iframe {
width:100%;
height:500px;
margin-top:15px;
border-radius:10px;
}

/* Table */
table {
width:100%;
border-collapse:collapse;
margin-top:25px;
background:white;
}

th {background:#003366; color:white; padding:10px;}
td {padding:10px; border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="tuv.png" class="logo">
<div class="title">Smart Audit Engine</div>
<img src="vodafone.png" class="logo">
</div>

<div class="vodafone-line"></div>

<div class="container">

<input type="text" id="search" placeholder="🔍 Search (PPE, Height, EN 361...)">

<select id="ppeFilter">
<option value="">Select PPE Category</option>
<option value="height">Working at Height</option>
<option value="electrical">Electrical Work</option>
</select>

<div id="results"></div>
<div id="ppeResults"></div>

<iframe id="pdfViewer"></iframe>

<h2>PPE & EN Standards (Full List)</h2>

<table>
<tr><th>PPE</th><th>EN Standard</th></tr>
<tr><td>Helmet</td><td>EN 397</td></tr>
<tr><td>High Visibility Vest</td><td>EN ISO 20471</td></tr>
<tr><td>Safety Shoes</td><td>EN ISO 20345</td></tr>
<tr><td>Harness</td><td>EN 361</td></tr>
<tr><td>Lanyard</td><td>EN 355</td></tr>
<tr><td>Gloves</td><td>EN 388 / EN 374</td></tr>
<tr><td>Eye Protection</td><td>EN 166</td></tr>
<tr><td>Respirator</td><td>EN 140 / EN 143</td></tr>
<tr><td>Hearing Protection</td><td>EN 352</td></tr>
</table>

</div>

<script>

// MAIN DATA
const data = [
{
activity:"Working at Height",
text:"Workers must remain attached at all times using full body harness.",
hazard:"Fall from height",
ppe:"Harness, Lanyard, Helmet",
en:"EN 361, EN 355, EN 397",
page:8,
file:"HSW22.pdf"
},
{
activity:"Electrical Work",
text:"No live electrical work is allowed.",
hazard:"Electric shock",
ppe:"Insulated gloves, helmet, face shield",
en:"EN 60903, EN 397, EN 166",
page:9,
file:"HSW22.pdf"
}
];

// PPE DETAILS
const ppeDetails = {
height: `
<h3>Working at Height - PPE Standards</h3>
<ul>
<li>EN 361 / 358 / 813 - Harness</li>
<li>EN 354 / 355 - Lanyards</li>
<li>EN 360 - Fall Arrestors</li>
<li>EN 362 - Connectors</li>
<li>EN 795 - Anchors</li>
<li>EN 397 - Helmet</li>
</ul>
`,
electrical: `
<h3>Electrical Work - PPE Standards</h3>
<ul>
<li>EN 60903 - Gloves</li>
<li>EN 50321 - Footwear</li>
<li>EN 6111 - Insulating mat</li>
<li>EN 166 - Face shield</li>
</ul>
`
};

const resultsDiv = document.getElementById("results");
const viewer = document.getElementById("pdfViewer");

// SEARCH
document.getElementById("search").addEventListener("input", function(e){

let keyword = e.target.value.toLowerCase();
resultsDiv.innerHTML = "";

if(keyword === "") return;

let results = data.filter(item =>
item.text.toLowerCase().includes(keyword) ||
item.activity.toLowerCase().includes(keyword) ||
item.ppe.toLowerCase().includes(keyword) ||
item.en.toLowerCase().includes(keyword)
);

results.forEach(item => {
resultsDiv.innerHTML += `
<div class="result">
<div class="section">${item.activity}</div>
<div><b>Requirement:</b> ${item.text}</div>
<div><b>Hazard:</b> ${item.hazard}</div>
<div><b>PPE:</b> ${item.ppe}</div>
<div><b>EN:</b> ${item.en}</div>
<button onclick="openPDF('${item.file}', ${item.page})">
📄 Open Page ${item.page}
</button>
</div>
`;
});

});

// DROPDOWN
document.getElementById("ppeFilter").addEventListener("change", function(){

let value = this.value;
let output = document.getElementById("ppeResults");

if(value === ""){
output.innerHTML = "";
return;
}

output.innerHTML = `
<div class="result">
${ppeDetails[value]}
</div>
`;

});

// PDF
function openPDF(file, page){
viewer.src = file + "#page=" + page;
}

</script>

</body>
</html>
