<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Audit Engine</title>

<style>
body {font-family:'Segoe UI'; margin:0; background:#f4f6f8;}

.header {
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:15px 25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo {height:50px;}

.title {
font-size:20px;
font-weight:bold;
color:#003366;
text-align:center;
flex:1;
}

.vodafone-line {height:5px; background:#e60000;}

.container {padding:20px;}

#search, #ppeFilter {
width:100%;
padding:12px;
margin-bottom:10px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
}

.result {
background:white;
margin-top:12px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
border-left:5px solid #003366;
}

.section {font-weight:bold; color:#003366;}
.highlight {background:yellow;}

button {
margin-top:10px;
padding:8px 12px;
background:#e60000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

iframe {
width:100%;
height:500px;
margin-top:15px;
border-radius:10px;
}

ul {margin-top:5px;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="tuv.png" class="logo">
<div class="title">Smart Audit Engine</div>
<img src="vodafone.png" class="logo">
</div>

<div class="vodafone-line"></div>

<div class="container">

<input type="text" id="search" placeholder="🔍 Search (PPE, Height, EN 361...)">

<select id="ppeFilter">
<option value="">Select PPE Category</option>
<option value="height">Working at Height</option>
<option value="electrical">Electrical Work</option>
</select>

<div id="results"></div>
<div id="ppeResults"></div>

<iframe id="pdfViewer"></iframe>

</div>

<script>

// SEARCH DATA
const data = [
{
activity:"Working at Height",
text:"Workers must remain attached using full body harness.",
hazard:"Fall from height",
ppe:"Harness, Lanyard, Helmet",
en:"EN 361, EN 355, EN 397",
page:8,
file:"HSW22.pdf"
},
{
activity:"Electrical Work",
text:"No live electrical work allowed.",
hazard:"Electric shock",
ppe:"Insulated gloves, helmet",
en:"EN 60903, EN 397",
page:9,
file:"HSW22.pdf"
}
];

// SEARCH FUNCTION
document.getElementById("search").addEventListener("input", function(e){

let keyword = e.target.value.toLowerCase();
let resultsDiv = document.getElementById("results");
resultsDiv.innerHTML = "";

if(keyword === "") return;

let results = data.filter(item =>
item.text.toLowerCase().includes(keyword) ||
item.activity.toLowerCase().includes(keyword) ||
item.ppe.toLowerCase().includes(keyword) ||
item.en.toLowerCase().includes(keyword)
);

results.forEach(item => {
resultsDiv.innerHTML += `
<div class="result">
<div class="section">${item.activity}</div>
<div><b>Requirement:</b> ${item.text}</div>
<div><b>Hazard:</b> ${item.hazard}</div>
<div><b>PPE:</b> ${item.ppe}</div>
<div><b>EN:</b> ${item.en}</div>
<button onclick="openPDF('${item.file}', ${item.page})">
📄 Open Page ${item.page}
</button>
</div>
`;
});

});

// PPE DETAILS (ADVANCED)
const ppeDetails = {

height: `
<h3>🧗 Working at Height</h3>

<b>🔹 Fall Arrest Equipment:</b>
<ul>
<li>EN 361 / EN 358 / EN 813 – Harness</li>
<li>EN 354 / EN 355 – Lanyards</li>
<li>EN 360 – Fall Arrestors</li>
<li>EN 362 – Connectors</li>
<li>EN 363 – Systems</li>
<li>EN 353-1 / 353-2 – Fall Arrest Systems</li>
<li>EN 795 – Anchors</li>
</ul>

<b>🔹 Work Positioning:</b>
<ul>
<li>EN 358 – Sit Harness</li>
<li>EN 341 – Descenders</li>
<li>EN 567 – Rope Clamps</li>
<li>EN 12278 – Pulleys</li>
<li>EN 1891 – Rope Access</li>
</ul>

<b>🔹 Other PPE:</b>
<ul>
<li>EN 397 – Helmet</li>
<li>EN 12492 – Climbing Helmet</li>
<li>EN 12275 – Connectors</li>
<li>EN 566 / EN 795B / EN 1492-2 – Slings</li>
<li>BS 1290 – Wire Slings</li>
</ul>
`,

electrical: `
<h3>⚡ Electrical Work</h3>

<ul>
<li>EN/IEC 60903 – Insulated Gloves</li>
<li>EN 50321 – Footwear</li>
<li>EN 6111 – Insulating Mat</li>
<li>EN 166 / EN 170 – Face Shield</li>
</ul>
`
};

// DROPDOWN FUNCTION
document.getElementById("ppeFilter").addEventListener("change", function(){

let value = this.value;
let output = document.getElementById("ppeResults");

if(value === ""){
output.innerHTML = "";
return;
}

output.innerHTML = `<div class="result">${ppeDetails[value]}</div>`;
});

// PDF VIEWER
function openPDF(file, page){
document.getElementById("pdfViewer").src = file + "#page=" + page;
}

</script>

</body>
</html>
